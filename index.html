    <script>
      // Protect window.fetch from being overwritten by libraries
      (function() {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() { return originalFetch; },
            set: function(v) { 
              console.warn('Prevented library from overwriting window.fetch');
            }
          });
        } catch (err) {
          // Silently fail if we can't redefine it
        }
        
        // Polyfill global for libraries that expect it (e.g. some SDKs)
        // We use a separate object to avoid the "Cannot set property fetch of #<Window>" error
        if (typeof window.global === 'undefined') {
          window.global = {
            fetch: originalFetch.bind(window)
          };
        }
      })();
    </script>
